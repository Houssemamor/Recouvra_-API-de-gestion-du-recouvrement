# CI Workflow — Runs tests on every push/PR and creates a GitHub Issue on failure.
#
# Jobs:
#   test          — Install dependencies, run Jest test suite, upload results.
#   create-issue  — Opens a GitHub Issue when the test job fails (Observer pattern).

name: CI — Test & Report Bugs

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read
  issues: write

jobs:
  # ---------------------------------------------------------------
  # Job 1: Run the full test suite
  # ---------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # Provision a live MongoDB instance for integration and E2E tests
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests (JSON output)
        id: tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.1:27017/recouvra-test
          JWT_SECRET: supersecret
        run: |
          # Run tests and capture output; allow failure so we can report it.
          npx jest --runInBand --ci --json --outputFile=test-results.json 2>&1 | tee test-output.txt
          TEST_EXIT=$?
          echo "exit_code=$TEST_EXIT" >> "$GITHUB_OUTPUT"
          
          # Only proceed to E2E tests if unit/integration tests pass
          if [ $TEST_EXIT -ne 0 ]; then
            exit $TEST_EXIT
          fi

      - name: Run Postman E2E Tests (Newman)
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.1:27017/recouvra-e2e
          JWT_SECRET: supersecret
          PORT: 3000
        run: |
          # Start the backend server in the background
          npm start &
          
          # Wait for the health endpoint to become responsive
          npx -y wait-on http://localhost:3000/api/health
          
          # Run the updated Postman collection
          npx -y newman run ./postman/Recouvra+.postman_collection.json --env-var "baseUrl=http://localhost:3000/api"
          
          # Capture Newman exit code and exit properly so the CI knows if it failed
          NEWMAN_EXIT=$?
          exit $NEWMAN_EXIT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.json
            test-output.txt
          retention-days: 7

  # ---------------------------------------------------------------
  # Job 2: Create a GitHub Issue when tests fail
  # ---------------------------------------------------------------
  create-issue:
    name: Report Bug Issue
    runs-on: ubuntu-latest
    needs: test
    if: failure()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
        continue-on-error: true

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            for (const label of [{name:'bug',color:'d73a4a'},{name:'ci',color:'0e8a16'}]) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name, color: label.color });
              }
            }

      - name: Build issue body and create issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // --- Gather failure details from the JSON report ---
            let failedTests = [];
            let summary = '';
            try {
              const raw = fs.readFileSync('test-results.json', 'utf8');
              const report = JSON.parse(raw);

              const totalSuites = report.numTotalTestSuites || 0;
              const passedSuites = report.numPassedTestSuites || 0;
              const failedSuites = report.numFailedTestSuites || 0;
              const totalTests = report.numTotalTests || 0;
              const passedTests = report.numPassedTests || 0;
              const failedTestCount = report.numFailedTests || 0;

              summary = `| Metric | Count |\n|---|---|\n`
                + `| Total suites | ${totalSuites} |\n`
                + `| Passed suites | ${passedSuites} |\n`
                + `| Failed suites | ${failedSuites} |\n`
                + `| Total tests | ${totalTests} |\n`
                + `| Passed tests | ${passedTests} |\n`
                + `| Failed tests | ${failedTestCount} |\n`;

              // Collect individual failure messages
              for (const suite of (report.testResults || [])) {
                for (const test of (suite.assertionResults || [])) {
                  if (test.status === 'failed') {
                    const messages = (test.failureMessages || []).join('\n').substring(0, 500);
                    failedTests.push(`### \`${test.ancestorTitles.join(' > ')} > ${test.title}\`\n\`\`\`\n${messages}\n\`\`\``);
                  }
                }
              }
            } catch (e) {
              summary = '_Could not parse test-results.json — the test runner may have crashed before producing output._';
            }

            // --- Read raw console output as fallback ---
            let rawOutput = '';
            try {
              rawOutput = fs.readFileSync('test-output.txt', 'utf8').substring(0, 3000);
            } catch (_) {}

            // --- Build issue body ---
            const sha = context.sha.substring(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const actor = context.actor;

            let body = `## CI Test Failure\n\n`
              + `| Detail | Value |\n|---|---|\n`
              + `| Branch | \`${branch}\` |\n`
              + `| Commit | \`${sha}\` |\n`
              + `| Triggered by | @${actor} |\n`
              + `| Workflow run | [View logs](${runUrl}) |\n\n`
              + `## Test Summary\n\n${summary}\n`;

            if (failedTests.length > 0) {
              body += `\n## Failed Tests\n\n${failedTests.join('\n\n')}\n`;
            }

            if (rawOutput) {
              body += `\n<details><summary>Raw console output (truncated)</summary>\n\n\`\`\`\n${rawOutput}\n\`\`\`\n</details>\n`;
            }

            // --- Check for an existing open issue to avoid duplicates ---
            const title = `CI Bug: Tests failed on \`${branch}\` (${sha})`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug,ci',
              per_page: 10,
            });

            const duplicate = existing.data.find(i => i.title.includes(branch) && i.title.includes('CI Bug'));

            if (duplicate) {
              // Append a comment to the existing issue instead of opening a new one.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `### New failure on commit \`${sha}\`\n\n${body}`,
              });
              core.info(`Updated existing issue #${duplicate.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'ci'],
              });
              core.info('Created new bug issue');
            }
